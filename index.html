<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Night Racer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ═══ CONFIG ═══
const LANES = 3;
const ROAD_W_RATIO = 0.34;

// ═══ STATE ═══
let state = 'start';
let score = 0;
let highScore = +(localStorage.getItem('nightRacerHi') || 0);
let lives = 3;
let speed = 0;
let maxSpeed = 6;
let scrollY = 0;
let playerLane = 1;
let playerX = 0;
let playerTargetX = 0;
let turboOn = false;
let turboTimer = 0;
let turboCooldown = 0;
let invincible = 0;
let spinning = false;
let spinAngle = 0;
let flashAlpha = 0;
let distM = 0;
let speedUpTimer = 0;
let frame = 0;
let dt = 1/60;
let lastT = 0;

let roadW, roadL, roadR, laneW, laneXs;
function calcRoad() {
  roadW = W * ROAD_W_RATIO;
  roadL = (W - roadW) / 2;
  roadR = roadL + roadW;
  laneW = roadW / LANES;
  laneXs = [];
  for (let i = 0; i < LANES; i++) laneXs.push(roadL + laneW * i + laneW / 2);
}
calcRoad();
window.addEventListener('resize', () => { resize(); calcRoad(); });

// ═══ INPUT ═══
const kDown = {}, kPress = {};
let tapL = false, tapR = false, tapTurbo = false;
document.addEventListener('keydown', e => {
  if (!kDown[e.code]) kPress[e.code] = true;
  kDown[e.code] = true;
  if (state === 'start') startGame();
  if (state === 'gameover' && (e.code === 'Enter' || e.code === 'Space')) startGame();
});
document.addEventListener('keyup', e => kDown[e.code] = false);
C.addEventListener('touchstart', onTouch, {passive:false});
C.addEventListener('touchmove', onTouch, {passive:false});
C.addEventListener('touchend', () => { tapL=tapR=tapTurbo=false; });
function onTouch(e) {
  e.preventDefault(); tapL=tapR=tapTurbo=false;
  for (const t of e.touches) {
    const rx = t.clientX/W;
    if (rx < 0.33) tapL = true;
    else if (rx > 0.66) tapR = true;
    else tapTurbo = true;
  }
  if (state === 'start') startGame();
  if (state === 'gameover') startGame();
}

// ═══ ENEMIES ═══
const enemies = [];
const ECOLORS = ['#c83232','#2266dd','#33aa55','#dddd33','#ee6600','#8833cc','#dddddd','#bb5588','#44aacc','#ff7799'];
const ETYPES = [
  {name:'sedan',w:0.7,h:1.0},{name:'suv',w:0.8,h:1.25},
  {name:'sports',w:0.65,h:0.9},{name:'truck',w:0.85,h:1.8},{name:'van',w:0.8,h:1.35},
];
const MIN_SAME_LANE_GAP = 300;
const WALL_CHECK_GAP = 350;
const ENEMY_SPEED = 2.0;

function spawnEnemy() {
  const spawnY = -80 - Math.random()*80;
  const laneClear = [true,true,true];
  for (const e of enemies) if (Math.abs(e.y - spawnY) < MIN_SAME_LANE_GAP) laneClear[e.lane] = false;
  const freeLanes = [];
  for (let i=0;i<LANES;i++) if (laneClear[i]) freeLanes.push(i);
  if (!freeLanes.length) return;
  const safeLanes = [];
  for (const lane of freeLanes) if (!wouldCreateWall(lane, spawnY)) safeLanes.push(lane);
  if (!safeLanes.length) return;
  const lane = safeLanes[Math.floor(Math.random()*safeLanes.length)];
  enemies.push({
    lane, x:laneXs[lane], y:spawnY,
    type:ETYPES[Math.floor(Math.random()*ETYPES.length)],
    color:ECOLORS[Math.floor(Math.random()*ECOLORS.length)],
    espeed:ENEMY_SPEED,
  });
}
function wouldCreateWall(nl, ny) {
  const byL=[[],[],[]];
  for (const e of enemies) byL[e.lane].push(e.y);
  byL[nl].push(ny);
  for (let a=0;a<3;a++) for (let b=a+1;b<3;b++) {
    const c=3-a-b;
    for (const ya of byL[a]) for (const yb of byL[b])
      if (Math.abs(ya-yb)<WALL_CHECK_GAP) {
        const m=(ya+yb)/2;
        for (const yc of byL[c]) if (Math.abs(yc-m)<WALL_CHECK_GAP) return true;
      }
  }
  return false;
}

// ═══ COINS ═══
const coins = [];
function spawnCoin() { const l=Math.floor(Math.random()*LANES); coins.push({lane:l,x:laneXs[l],y:-60-Math.random()*100}); }

// ═══ PARTICLES ═══
const particles = [];
function emitParticles(x, y, count, color, vx, vy, life) {
  for (let i=0;i<count;i++) particles.push({
    x, y, vx: vx+(Math.random()-0.5)*60, vy: vy+(Math.random()-0.5)*60,
    life: life*(0.5+Math.random()*0.5), maxLife: life, color, size: 1+Math.random()*3
  });
}

// ═══ STARS ═══
const stars = [];
for (let i=0;i<120;i++) stars.push({x:Math.random(),y:Math.random()*0.6,size:0.5+Math.random()*1.5,twinkle:Math.random()*Math.PI*2,bright:0.3+Math.random()*0.7});

// ═══ BUILDINGS ═══
const buildingsL = [], buildingsR = [];
function spawnBuildings() {
  for (let y=-200;y<H+200;y+=50+Math.random()*70) {
    addBuilding(buildingsL,'left',y);
    addBuilding(buildingsR,'right',y);
  }
}
function addBuilding(arr, side, y) {
  const bw = 35+Math.random()*80;
  const bh = 50+Math.random()*120;
  const floors = Math.floor(bh/15);
  const hue = 200+Math.random()*40;
  const color = `hsl(${hue},${8+Math.random()*12}%,${6+Math.random()*10}%)`;
  const accentColor = `hsl(${hue+Math.random()*30},${15+Math.random()*20}%,${12+Math.random()*8}%)`;
  const windowColor = Math.random()>0.4 ? '#ffdd66' : Math.random()>0.5 ? '#aaccff' : '#ff8866';
  const hasNeon = Math.random()>0.7;
  const neonColor = ['#ff0066','#00ffcc','#ff6600','#6644ff','#ffcc00'][Math.floor(Math.random()*5)];
  const neonY = 0.3+Math.random()*0.4;
  const x = side==='left' ? roadL-bw-8-Math.random()*50 : roadR+8+Math.random()*50;
  const hasAC = Math.random()>0.6;
  const hasAntenna = Math.random()>0.7;
  arr.push({x,y,w:bw,h:bh,floors,color,accentColor,windowColor,hasNeon,neonColor,neonY,seed:Math.random()*999,hasAC,hasAntenna});
}

// ═══ STREETLIGHTS ═══
const streetLights = [];
function spawnStreetLights() {
  for (let y=0;y<H+400;y+=130+Math.random()*40) streetLights.push({y,side:Math.random()<0.5?'left':'right'});
}

// ═══ ROAD MARKS (cracks, patches, manhole) ═══
const roadMarks = [];
function spawnRoadMarks() {
  for (let y=-200;y<H+400;y+=80+Math.random()*120) {
    const type = Math.random()<0.3 ? 'manhole' : Math.random()<0.5 ? 'patch' : 'crack';
    roadMarks.push({y, x: roadL+Math.random()*(roadR-roadL), type, w:5+Math.random()*20, seed:Math.random()});
  }
}

// ═══ INIT ═══
function startGame() {
  state='play'; score=0; lives=3; speed=0; maxSpeed=6;
  scrollY=0; playerLane=1; spinning=false; spinAngle=0;
  turboOn=false; turboTimer=0; turboCooldown=0;
  invincible=0; flashAlpha=0; distM=0; speedUpTimer=0;
  enemies.length=0; coins.length=0; particles.length=0;
  buildingsL.length=0; buildingsR.length=0; streetLights.length=0; roadMarks.length=0;
  calcRoad();
  playerTargetX=laneXs[playerLane]; playerX=playerTargetX;
  spawnBuildings(); spawnStreetLights(); spawnRoadMarks();
}
spawnBuildings(); spawnStreetLights(); spawnRoadMarks();

// ═══ UPDATE ═══
function update() {
  if (state!=='play') return;
  const tgtSpd = turboOn ? maxSpeed*1.7 : maxSpeed;
  if (speed<tgtSpd) speed=Math.min(tgtSpd, speed+(turboOn?15:6)*dt);
  else speed=Math.max(tgtSpd, speed-4*dt);
  scrollY += speed*60*dt;
  distM += speed*10*dt;
  speedUpTimer+=dt;
  if (speedUpTimer>=15){speedUpTimer=0;maxSpeed+=0.5;}

  const goL=kPress['ArrowLeft']||kPress['KeyA']||tapL;
  const goR=kPress['ArrowRight']||kPress['KeyD']||tapR;
  kPress['ArrowLeft']=kPress['KeyA']=kPress['ArrowRight']=kPress['KeyD']=false;
  tapL=tapR=false;
  if (goL&&!spinning&&playerLane>0) playerLane--;
  if (goR&&!spinning&&playerLane<LANES-1) playerLane++;
  playerTargetX=laneXs[playerLane];
  playerX+=(playerTargetX-playerX)*Math.min(1,12*dt);

  if ((kPress['Space']||tapTurbo)&&!turboOn&&turboCooldown<=0&&!spinning){turboOn=true;turboTimer=3;}
  kPress['Space']=false;tapTurbo=false;
  if (turboOn){turboTimer-=dt;if(turboTimer<=0){turboOn=false;turboCooldown=5;}}
  if (turboCooldown>0) turboCooldown-=dt;
  if (invincible>0) invincible-=dt;
  if (spinning){spinAngle+=14*dt;speed=Math.max(0,speed-8*dt);if(spinAngle>=Math.PI*4){spinning=false;spinAngle=0;invincible=2.5;}}
  score+=Math.round((turboOn?2:1)*speed*dt*8);

  // exhaust particles
  if (speed>1 && frame%3===0) {
    const px=playerX, py=H*0.82;
    const cw=laneW*0.34, ch=laneW*0.55;
    emitParticles(px-cw*0.12, py+ch*0.48, 1, 'rgba(100,100,120,0.5)', 0, 20, 0.4);
    emitParticles(px+cw*0.12, py+ch*0.48, 1, 'rgba(100,100,120,0.5)', 0, 20, 0.4);
  }
  if (turboOn && frame%2===0) {
    const px=playerX, py=H*0.82;
    const ch=laneW*0.55;
    emitParticles(px, py+ch*0.5, 2, `rgba(${50+Math.random()*200|0},${100+Math.random()*155|0},255,0.7)`, 0, 40, 0.3);
  }

  // particles update
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.life-=dt;
    if (p.life<=0) particles.splice(i,1);
  }

  const scrollDelta=speed*60*dt;
  const py=H*0.82;
  enemies.sort((a,b)=>a.y-b.y);
  for (let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i];
    let es=e.espeed;
    for (let j=0;j<enemies.length;j++) {
      if (j===i) continue;
      const o=enemies[j];
      if (o.lane===e.lane&&o.y>e.y&&o.y-e.y<MIN_SAME_LANE_GAP*0.9) es=Math.max(es,o.espeed);
    }
    e.y+=scrollDelta-es*60*dt;
    e.x=laneXs[e.lane];
    if (e.y>H+200){enemies.splice(i,1);continue;}
    const carH=laneW*0.40*e.type.h, carW2=laneW*0.40*e.type.w;
    const pCarH=laneW*0.50, pCarW=laneW*0.30;
    if (!spinning&&invincible<=0&&Math.abs(e.x-playerX)<(carW2+pCarW)*0.8&&e.y+carH/2>py-pCarH/2&&e.y-carH/2<py+pCarH/2) {
      emitParticles(playerX, py, 20, '#ff8800', 0, -30, 0.6);
      emitParticles(playerX, py, 10, '#ffcc00', 0, 0, 0.8);
      doCollision(); enemies.splice(i,1);
    }
  }

  for (let i=coins.length-1;i>=0;i--) {
    coins[i].y+=scrollDelta; coins[i].x=laneXs[coins[i].lane];
    if (coins[i].y>H+100){coins.splice(i,1);continue;}
    if (Math.abs(coins[i].x-playerX)<laneW*0.5&&Math.abs(coins[i].y-py)<laneW*0.4) {
      emitParticles(coins[i].x, coins[i].y, 8, '#ffdd44', 0, -20, 0.5);
      score+=500; coins.splice(i,1);
    }
  }

  for (const b of buildingsL) b.y+=scrollDelta;
  for (const b of buildingsR) b.y+=scrollDelta;
  for (const l of streetLights) l.y+=scrollDelta;
  for (const m of roadMarks) m.y+=scrollDelta;

  for (let i=buildingsL.length-1;i>=0;i--) if(buildingsL[i].y>H+200){buildingsL.splice(i,1);addBuilding(buildingsL,'left',-100-Math.random()*100);}
  for (let i=buildingsR.length-1;i>=0;i--) if(buildingsR[i].y>H+200){buildingsR.splice(i,1);addBuilding(buildingsR,'right',-100-Math.random()*100);}
  for (let i=streetLights.length-1;i>=0;i--) if(streetLights[i].y>H+200){streetLights[i].y=-50-Math.random()*100;streetLights[i].side=Math.random()<0.5?'left':'right';}
  for (let i=roadMarks.length-1;i>=0;i--) {
    if(roadMarks[i].y>H+100){roadMarks.splice(i,1);
      const type=Math.random()<0.3?'manhole':Math.random()<0.5?'patch':'crack';
      roadMarks.push({y:-50-Math.random()*100,x:roadL+Math.random()*(roadR-roadL),type,w:5+Math.random()*20,seed:Math.random()});
    }
  }

  if (enemies.length<4+Math.floor(speed*0.3)) if(Math.random()<0.015+speed*0.002) spawnEnemy();
  if (Math.random()<0.006) spawnCoin();
  if (flashAlpha>0) flashAlpha-=dt*3;
}

function doCollision() {
  lives--; flashAlpha=1; spinning=true; spinAngle=0; turboOn=false;
  if (lives<=0){state='gameover';if(score>highScore){highScore=score;localStorage.setItem('nightRacerHi',''+highScore);}speed=0;}
}

// ═══════════════════════════════════
// ═══ RENDERING ═══
// ═══════════════════════════════════

function render() {
  X.clearRect(0,0,W,H);
  if (state==='start'){drawStart();return;}
  drawScene();
  drawHUD();
  if (state==='gameover') drawGameOver();
}

function drawScene() {
  // sky gradient
  const skyG = X.createLinearGradient(0,0,0,H*0.4);
  skyG.addColorStop(0,'#040410');
  skyG.addColorStop(0.5,'#0a0a1a');
  skyG.addColorStop(1,'#101025');
  X.fillStyle = skyG;
  X.fillRect(0,0,W,H);

  // stars
  for (const s of stars) {
    const tw = 0.4+Math.sin(frame*0.03+s.twinkle)*0.3;
    X.globalAlpha = s.bright*tw;
    X.fillStyle = '#ffffff';
    X.beginPath(); X.arc(s.x*W, s.y*H, s.size, 0, Math.PI*2); X.fill();
  }
  X.globalAlpha = 1;

  // moon
  const moonX=W*0.82, moonY=H*0.08, moonR=Math.min(W,H)*0.025;
  const moonG = X.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*4);
  moonG.addColorStop(0,'rgba(200,210,255,0.12)');
  moonG.addColorStop(1,'rgba(100,120,200,0)');
  X.fillStyle=moonG; X.fillRect(moonX-moonR*5,moonY-moonR*5,moonR*10,moonR*10);
  X.fillStyle='#dde4ff';
  X.beginPath(); X.arc(moonX,moonY,moonR,0,Math.PI*2); X.fill();
  X.fillStyle='rgba(180,190,220,0.5)';
  X.beginPath(); X.arc(moonX-moonR*0.2,moonY-moonR*0.1,moonR*0.3,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(moonX+moonR*0.3,moonY+moonR*0.25,moonR*0.15,0,Math.PI*2); X.fill();

  // buildings
  for (const b of buildingsL) drawBuilding(b);
  for (const b of buildingsR) drawBuilding(b);

  // sidewalk
  const swW=14;
  const swG = X.createLinearGradient(roadL-swW,0,roadL,0);
  swG.addColorStop(0,'#1a1a22'); swG.addColorStop(1,'#2a2a34');
  X.fillStyle=swG; X.fillRect(roadL-swW,0,swW,H);
  const swG2 = X.createLinearGradient(roadR,0,roadR+swW,0);
  swG2.addColorStop(0,'#2a2a34'); swG2.addColorStop(1,'#1a1a22');
  X.fillStyle=swG2; X.fillRect(roadR,0,swW,H);
  // curb highlight
  X.fillStyle='rgba(255,255,255,0.06)';
  X.fillRect(roadL-1,0,2,H); X.fillRect(roadR-1,0,2,H);

  // road surface
  const roadG = X.createLinearGradient(roadL,0,roadR,0);
  roadG.addColorStop(0,'#18181f');
  roadG.addColorStop(0.15,'#1c1c25');
  roadG.addColorStop(0.5,'#1e1e28');
  roadG.addColorStop(0.85,'#1c1c25');
  roadG.addColorStop(1,'#18181f');
  X.fillStyle=roadG;
  X.fillRect(roadL,0,roadR-roadL,H);

  // road texture
  X.save(); X.globalAlpha=0.025;
  for (let y=0;y<H;y+=2) {
    X.fillStyle=(y+Math.floor(scrollY*0.7))%5<2?'#fff':'#000';
    X.fillRect(roadL,y,roadR-roadL,1);
  }
  X.restore();

  // road marks (cracks, manholes, patches)
  for (const m of roadMarks) drawRoadMark(m);

  // lane markings
  drawLaneMarkings();

  // streetlights (light cones on road BELOW cars)
  for (const l of streetLights) drawStreetLightGlow(l);

  // coins
  for (const c of coins) drawCoinSprite(c);

  // enemies
  for (const e of enemies) drawEnemyCar(e);

  // player headlight cone on road
  drawHeadlightCone();

  // player car
  drawPlayerCar();

  // streetlight poles (above cars)
  for (const l of streetLights) drawStreetLightPole(l);

  // particles on top
  drawParticles();

  // speed lines
  if (speed>maxSpeed*0.6||turboOn) drawSpeedLines();

  // flash
  if (flashAlpha>0) {
    X.fillStyle=`rgba(255,20,0,${flashAlpha*0.25})`;
    X.fillRect(0,0,W,H);
  }

  // vignette
  drawVignette();
}

// ═══ ROAD MARKS ═══
function drawRoadMark(m) {
  if (m.y<-30||m.y>H+30) return;
  X.save(); X.globalAlpha=0.08;
  if (m.type==='manhole') {
    X.fillStyle='#222';
    X.beginPath(); X.arc(m.x, m.y, 8, 0, Math.PI*2); X.fill();
    X.strokeStyle='#333'; X.lineWidth=1;
    X.beginPath(); X.arc(m.x, m.y, 8, 0, Math.PI*2); X.stroke();
    X.beginPath(); X.moveTo(m.x-5,m.y); X.lineTo(m.x+5,m.y); X.stroke();
    X.beginPath(); X.moveTo(m.x,m.y-5); X.lineTo(m.x,m.y+5); X.stroke();
  } else if (m.type==='patch') {
    X.fillStyle='#2a2a30';
    X.fillRect(m.x-m.w/2, m.y-m.w*0.3, m.w, m.w*0.6);
  } else {
    X.strokeStyle='#333'; X.lineWidth=0.8;
    X.beginPath(); X.moveTo(m.x,m.y);
    X.lineTo(m.x+m.w*Math.sin(m.seed*10), m.y+m.w*1.5);
    X.lineTo(m.x+m.w*Math.cos(m.seed*7), m.y+m.w*2.5);
    X.stroke();
  }
  X.restore();
}

// ═══ LANE MARKINGS ═══
function drawLaneMarkings() {
  const dashLen=42, gapLen=28, period=dashLen+gapLen;
  const offset=scrollY%period;

  // white solid edge lines with subtle glow
  const edgeW=Math.max(2,W*0.003);
  X.fillStyle='rgba(255,255,255,0.25)';
  X.fillRect(roadL,0,edgeW,H); X.fillRect(roadR-edgeW,0,edgeW,H);
  X.fillStyle='rgba(255,255,255,0.06)';
  X.fillRect(roadL-1,0,edgeW+2,H); X.fillRect(roadR-edgeW-1,0,edgeW+2,H);

  // dashed lane dividers
  const markW=Math.max(2,W*0.004);
  for (let l=1;l<LANES;l++) {
    const lx=roadL+laneW*l-markW/2;
    for (let y=-period+offset;y<H+period;y+=period) {
      // yellow with subtle glow
      X.fillStyle='rgba(200,180,60,0.15)';
      X.fillRect(lx-1,y,markW+2,dashLen);
      X.fillStyle='#9a8e35';
      X.fillRect(lx,y,markW,dashLen);
      // bright center
      X.fillStyle='rgba(220,200,80,0.3)';
      X.fillRect(lx+markW*0.3,y,markW*0.4,dashLen);
    }
  }
}

// ═══ BUILDINGS ═══
function drawBuilding(b) {
  if (b.y+b.h<-60||b.y>H+60) return;

  // main structure
  X.fillStyle=b.color;
  X.fillRect(b.x, b.y, b.w, b.h);

  // accent panel
  X.fillStyle=b.accentColor;
  X.fillRect(b.x+3, b.y, b.w*0.15, b.h);

  // top edge
  X.fillStyle='rgba(255,255,255,0.04)';
  X.fillRect(b.x, b.y, b.w, 2);

  // side highlight
  X.fillStyle='rgba(255,255,255,0.02)';
  X.fillRect(b.x, b.y, 1, b.h);

  // antenna
  if (b.hasAntenna) {
    X.fillStyle='#333';
    X.fillRect(b.x+b.w*0.4, b.y-12, 1.5, 12);
    X.fillStyle=frame%60<30?'#ff0000':'#440000';
    X.beginPath(); X.arc(b.x+b.w*0.4+0.75, b.y-12, 2, 0, Math.PI*2); X.fill();
  }

  // AC unit
  if (b.hasAC) {
    X.fillStyle='#1a1a20';
    X.fillRect(b.x+b.w*0.6, b.y+b.h*0.3, b.w*0.2, b.w*0.12);
    X.fillStyle='rgba(255,255,255,0.03)';
    X.fillRect(b.x+b.w*0.6, b.y+b.h*0.3, b.w*0.2, 1);
  }

  // windows
  const wW=4, wH=5, wGapX=9, wGapY=12;
  const cols=Math.floor((b.w-10)/wGapX);
  const rows=Math.floor((b.h-10)/wGapY);
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const lit=Math.sin(b.seed*100+r*7.3+c*13.1)>-0.1;
      const wx=b.x+6+c*wGapX, wy=b.y+6+r*wGapY;
      if (lit) {
        const flicker = 0.12+Math.sin(frame*0.008+b.seed+r*2+c*5)*0.04;
        X.globalAlpha=flicker;
        X.fillStyle=b.windowColor;
        X.fillRect(wx,wy,wW,wH);
        // window glow
        X.fillStyle=b.windowColor;
        X.globalAlpha=flicker*0.3;
        X.fillRect(wx-1,wy-1,wW+2,wH+2);
        X.globalAlpha=1;
      } else {
        X.fillStyle='rgba(20,20,30,0.5)';
        X.fillRect(wx,wy,wW,wH);
      }
    }
  }

  // neon sign
  if (b.hasNeon) {
    const ny=b.y+b.h*b.neonY;
    const nw=b.w*0.7;
    const nx=b.x+(b.w-nw)/2;
    const neonFlicker = 0.5+Math.sin(frame*0.1+b.seed*50)*0.3+Math.sin(frame*0.37+b.seed*20)*0.2;
    X.save();
    X.globalAlpha=Math.max(0,neonFlicker)*0.8;
    X.shadowColor=b.neonColor; X.shadowBlur=12;
    X.fillStyle=b.neonColor;
    X.fillRect(nx,ny,nw,3);
    X.shadowBlur=0;
    // glow on wall
    X.globalAlpha=Math.max(0,neonFlicker)*0.06;
    X.fillStyle=b.neonColor;
    X.fillRect(b.x,ny-15,b.w,30);
    X.restore();
  }
}

// ═══ PARTICLES ═══
function drawParticles() {
  for (const p of particles) {

  X.save(); X.globalAlpha=int; X.strokeStyle='rgba(200,220,255,0.6)'; X.lineWidth=1;
  for (let i=0;i<22;i++) {
    const sx=roadL+Math.random()*(roadR-roadL);
    const sy=Math.random()*H;
    const len=15+Math.random()*(25+speed*6);
    X.beginPath(); X.moveTo(sx,sy); X.lineTo(sx+(Math.random()-0.5)*2,sy+len); X.stroke();
  }
  X.restore();
}

// ═══ VIGNETTE ═══
function drawVignette() {
  const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.45)');
  X.fillStyle=vg;
  X.fillRect(0,0,W,H);
}

// ═══ HUD ═══
function drawHUD() {
  const fs=Math.min(24,W*0.024);
  const km=Math.round(speed*30);

  // score panel
  X.fillStyle='rgba(0,0,0,0.6)';
  rrect(10,10,190,68,10); X.fill();
  X.strokeStyle='rgba(255,255,255,0.06)'; X.lineWidth=1;
  rrect(10,10,190,68,10); X.stroke();
  X.fillStyle='#666'; X.font=`bold ${fs*0.55}px 'Segoe UI',sans-serif`; X.textAlign='left';
  X.fillText('SCORE',20,28);
  X.fillStyle='#fff'; X.font=`bold ${fs}px 'Consolas',monospace`;
  X.fillText(score.toString().padStart(7,'0'),20,52);
  X.fillStyle='#555'; X.font=`${fs*0.45}px sans-serif`;
  X.fillText(`DIST ${Math.floor(distM)}m`,20,70);

  // hi-score
  X.fillStyle='rgba(0,0,0,0.4)'; rrect(10,82,155,22,5); X.fill();
  X.fillStyle='#555'; X.font=`${fs*0.42}px sans-serif`; X.textAlign='left';
  X.fillText(`HI: ${highScore.toString().padStart(7,'0')}`,18,98);

  // lives
  for (let i=0;i<3;i++) drawHeart(W-44-i*38,26,13,i<lives?'#ff2244':'#331111');

  // speed
  X.fillStyle='rgba(0,0,0,0.6)'; rrect(W-130,55,120,38,8); X.fill();
  X.strokeStyle='rgba(255,255,255,0.06)'; X.lineWidth=1; rrect(W-130,55,120,38,8); X.stroke();
  X.fillStyle='#ff6644'; X.font=`bold ${fs*0.5}px sans-serif`; X.textAlign='left';
  X.fillText('SPD',W-122,72);
  const barW=60, barFill=Math.min(1,speed/(maxSpeed*1.5));
  X.fillStyle='#222'; rrect(W-82,64,barW,7,3); X.fill();
  const sg=X.createLinearGradient(W-82,0,W-82+barW,0);
  sg.addColorStop(0,'#ff3333');sg.addColorStop(1,'#ffaa00');
  X.fillStyle=sg; rrect(W-82,64,barW*barFill,7,3); X.fill();
  X.fillStyle='#ffcc44'; X.font=`bold ${fs*0.48}px monospace`; X.textAlign='right';
  X.fillText(km+'',W-16,87);

  // turbo bar
  const tbW=Math.min(250,W*0.2), tbH=10, tbX=W/2-tbW/2, tbY=H-20;
  X.fillStyle='rgba(0,0,0,0.55)'; rrect(tbX-2,tbY-2,tbW+4,tbH+4,5); X.fill();
  X.strokeStyle='rgba(255,255,255,0.05)'; rrect(tbX-2,tbY-2,tbW+4,tbH+4,5); X.stroke();
  if (turboCooldown>0) {
    X.fillStyle='#333'; rrect(tbX,tbY,tbW*(1-turboCooldown/5),tbH,4); X.fill();
  } else if (turboOn) {
    const tg=X.createLinearGradient(tbX,0,tbX+tbW,0);
    tg.addColorStop(0,'#0088ff');tg.addColorStop(0.5,'#00ddff');tg.addColorStop(1,'#0066ff');
    X.fillStyle=tg; rrect(tbX,tbY,tbW*(turboTimer/3),tbH,4); X.fill();
    X.shadowColor='#00ccff'; X.shadowBlur=6;
    rrect(tbX,tbY,tbW*(turboTimer/3),tbH,4); X.fill();
    X.shadowBlur=0;
  } else {
    const tg=X.createLinearGradient(tbX,0,tbX+tbW,0);
    tg.addColorStop(0,'#00aa44');tg.addColorStop(1,'#00ff88');
    X.fillStyle=tg; rrect(tbX,tbY,tbW,tbH,4); X.fill();
  }
  X.fillStyle='rgba(255,255,255,0.7)'; X.font=`bold ${Math.max(8,W*0.009)}px sans-serif`;
  X.textAlign='center';
  X.fillText(turboOn?'TURBO!':turboCooldown>0?'COOLING...':'TURBO [SPACE]',W/2,tbY+tbH-1);
}

function drawHeart(x,y,s,col) {
  X.fillStyle=col; X.beginPath();
  X.moveTo(x,y+s*0.3);
  X.bezierCurveTo(x,y-s*0.15,x-s,y-s*0.5,x-s,y+s*0.05);
  X.bezierCurveTo(x-s,y+s*0.6,x,y+s*1.0,x,y+s*1.15);
  X.bezierCurveTo(x,y+s*1.0,x+s,y+s*0.6,x+s,y+s*0.05);
  X.bezierCurveTo(x+s,y-s*0.5,x,y-s*0.15,x,y+s*0.3);
  X.fill();
}

function rrect(x,y,w,h,r) {
  X.beginPath(); X.moveTo(x+r,y); X.lineTo(x+w-r,y);
  X.quadraticCurveTo(x+w,y,x+w,y+r); X.lineTo(x+w,y+h-r);
  X.quadraticCurveTo(x+w,y+h,x+w-r,y+h); X.lineTo(x+r,y+h);
  X.quadraticCurveTo(x,y+h,x,y+h-r); X.lineTo(x,y+r);
  X.quadraticCurveTo(x,y,x+r,y); X.closePath();
}

// ═══ SCREENS ═══
function drawStart() {
  X.fillStyle='#040410'; X.fillRect(0,0,W,H);
  for (const s of stars) {
    X.globalAlpha=s.bright*(0.3+Math.sin(frame*0.02+s.twinkle)*0.2);
    X.fillStyle='#fff';
    X.beginPath(); X.arc(s.x*W,s.y*H,s.size,0,Math.PI*2); X.fill();
  }
  X.globalAlpha=1;

  for (const b of buildingsL) drawBuilding(b);
  for (const b of buildingsR) drawBuilding(b);
  X.fillStyle='#1e1e28'; X.fillRect(roadL,0,roadR-roadL,H);
  drawLaneMarkings();

  X.fillStyle='rgba(0,0,0,0.5)'; X.fillRect(0,0,W,H);
  drawVignette();

  const ts=Math.min(64,W*0.07);
  X.save();
  X.shadowColor='#ff4400'; X.shadowBlur=40;
  X.font=`bold ${ts}px 'Segoe UI',Arial,sans-serif`; X.textAlign='center';
  X.fillStyle='#ff6633';
  X.fillText('NIGHT RACER',W/2,H*0.28);
  X.shadowBlur=0;
  X.font=`${ts*0.2}px sans-serif`; X.fillStyle='#776655';
  X.fillText('TOP-DOWN ARCADE RACING',W/2,H*0.28+ts*0.4);

  const pulse=0.5+Math.sin(frame*0.06)*0.5;
  X.globalAlpha=0.5+pulse*0.5;
  X.font=`bold ${ts*0.26}px sans-serif`; X.fillStyle='#fff';
  X.fillText('PRESS ANY KEY OR TAP TO START',W/2,H*0.55);
  X.globalAlpha=1;
  X.font=`${ts*0.17}px sans-serif`; X.fillStyle='#887766';
  X.fillText('\u2190 \u2192 or A/D : Switch Lanes  |  SPACE : Turbo',W/2,H*0.63);
  if (highScore>0) {
    X.font=`bold ${ts*0.22}px sans-serif`; X.fillStyle='#ffaa33';
    X.fillText(`HIGH SCORE: ${highScore.toString().padStart(7,'0')}`,W/2,H*0.75);
  }
  X.restore();
}

function drawGameOver() {
  X.fillStyle='rgba(0,0,0,0.65)'; X.fillRect(0,0,W,H);
  const sz=Math.min(55,W*0.06);
  X.save();
  X.shadowColor='#ff0000'; X.shadowBlur=25;
  X.font=`bold ${sz}px 'Segoe UI',sans-serif`; X.textAlign='center';
  X.fillStyle='#ff3333'; X.fillText('GAME OVER',W/2,H*0.3);
  X.shadowBlur=0;
  X.font=`${sz*0.4}px sans-serif`; X.fillStyle='#fff';
  X.fillText(`SCORE: ${score.toString().padStart(7,'0')}`,W/2,H*0.42);
  X.fillText(`DISTANCE: ${Math.floor(distM)}m`,W/2,H*0.49);
  if (score>=highScore&&score>0) {
    X.fillStyle='#ffdd00'; X.font=`bold ${sz*0.35}px sans-serif`;
    X.fillText('\u2605 NEW HIGH SCORE \u2605',W/2,H*0.57);
  }
  const p=0.5+Math.sin(frame*0.06)*0.5;
  X.globalAlpha=0.5+p*0.5; X.fillStyle='#fff'; X.font=`bold ${sz*0.3}px sans-serif`;
  X.fillText('PRESS ENTER OR TAP TO RESTART',W/2,H*0.68);
  X.globalAlpha=1; X.restore();
}

// ═══ UTILS ═══
function darken(hex,amt) {
  hex=hex.replace('#','');
  if (hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  return`rgb(${Math.max(0,r*(1-amt))|0},${Math.max(0,g*(1-amt))|0},${Math.max(0,b*(1-amt))|0})`;
}

// ═══ LOOP ═══
function loop(t) {
  if (lastT===0) lastT=t;
  dt=Math.min(0.05,(t-lastT)/1000);
  lastT=t; frame++;
  update(); render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
