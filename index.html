<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Road Escape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;cursor:none}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
"use strict";
// ═══════════════════════════════════════════
//  ROAD ESCAPE — Complete Top-Down Racing Game
// ═══════════════════════════════════════════

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const offDesert = document.createElement('canvas');
const ctxD = offDesert.getContext('2d');
const offForest = document.createElement('canvas');
const ctxF = offForest.getContext('2d');

let W, H, ROAD_W, ROAD_L, ROAD_R, SHOULDER_W, LANE_W, NUM_LANES;

function resize() {
  W = canvas.width = offDesert.width = offForest.width = window.innerWidth;
  H = canvas.height = offDesert.height = offForest.height = window.innerHeight;
  ROAD_W = Math.min(W * 0.42, 320);
  ROAD_L = (W - ROAD_W) / 2;
  ROAD_R = ROAD_L + ROAD_W;
  SHOULDER_W = ROAD_W * 0.55;
  NUM_LANES = 3;
  LANE_W = ROAD_W / NUM_LANES;
}
resize();
window.addEventListener('resize', resize);

// ═══════════ RANDOM UTILS ═══════════
const rng = (a, b) => Math.random() * (b - a) + a;
const rngI = (a, b) => Math.floor(rng(a, b));
const pick = arr => arr[rngI(0, arr.length)];
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerpColor = (c1, c2, t) => {
  const p = (s, i) => parseInt(s.substr(i, 2), 16);
  const r = Math.round(lerp(p(c1,1), p(c2,1), t));
  const g = Math.round(lerp(p(c1,3), p(c2,3), t));
  const b = Math.round(lerp(p(c1,5), p(c2,5), t));
  return `rgb(${r},${g},${b})`;
};

// ═══════════ GAME STATE ═══════════
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3 };
let gameState = STATE.MENU;
let score = 0, bestScore = parseInt(localStorage.getItem('roadEscapeBest')) || 0;
let distance = 0, lives = 3, speed = 0, baseSpeed = 3.5;
let scrollOffset = 0, gameTime = 0, totalTime = 0;
let nitroActive = false, nitroCooldown = 0, nitroTimer = 0;
let invincible = false, invTimer = 0, flashCount = 0;
let shakeTimer = 0, shakeX = 0, shakeY = 0;
let redVignette = 0;
let nearMissFlash = 0, nearMissText = '';
let multiplier = 1;
let biomeTransitions = 0;
let difficultyTimer = 0, spawnRate = 0.018, speedCap = 1.3;
let enemyTypePool = [0];
let pauseAlpha = 0;
let menuScroll = 0;
let fpsCounter = 0, fpsDisplay = 0, fpsTime = 0;

// ═══════════ BIOME SYSTEM ═══════════
const BIOME = { DESERT: 0, FOREST: 1 };
let currentBiome = BIOME.DESERT;
let nextBiome = BIOME.FOREST;
let biomeTimer = 0;
const BIOME_DURATION = 45;
const TRANSITION_DURATION = 3;
let transitioning = false;
let transitionProgress = 0;
let biomeBadge = { show: false, alpha: 0, y: -40, timer: 0, name: '', color: '' };

// ═══════════ ROAD DECORATION POOLS ═══════════
let cacti = [], rocks = [], roadSigns = [], utilityPoles = [], deadShrubs = [];
let tumbleweeds = [], sandDrifts = [], desertCracks = [];
let trees = [], streetLamps = [], fallenLogs = [], undergrowth = [], roadMarkers = [];
let fallenLeaves = [], treeShadows = [], dappleSpots = [];

function initDesertObjects() {
  cacti = []; rocks = []; roadSigns = []; utilityPoles = [];
  deadShrubs = []; tumbleweeds = []; sandDrifts = []; desertCracks = [];
  for (let y = -100; y < H + 200; y += rng(60, 120)) {
    const side = Math.random() < 0.5 ? -1 : 1;
    const x = side > 0 ? ROAD_R + rng(20, SHOULDER_W - 20) : ROAD_L - rng(20, SHOULDER_W - 20);
    cacti.push({ x, y, h: pick([18, 28, 40]), side });
  }
  for (let y = -100; y < H + 200; y += rng(80, 160)) {
    const side = Math.random() < 0.5 ? -1 : 1;
    const x = side > 0 ? ROAD_R + rng(30, SHOULDER_W + 30) : ROAD_L - rng(30, SHOULDER_W + 30);
    const cluster = [];
    for (let i = 0; i < rngI(2, 4); i++) {
      cluster.push({ dx: rng(-15, 15), dy: rng(-10, 10), w: rng(12, 25), h: rng(10, 20) });
    }
    rocks.push({ x, y, cluster, side });
  }
  for (let y = -100; y < H + 200; y += rng(180, 240)) {
    const side = y % 400 < 200 ? 1 : -1;
    const x = side > 0 ? ROAD_R + 8 : ROAD_L - 30;
    roadSigns.push({ x, y, side, text: Math.random() < 0.5 ? 'HWY' : '' + rngI(55, 85) });
  }
  for (let y = -100; y < H + 200; y += 180) {
    const side = y % 360 < 180 ? 1 : -1;
    const x = side > 0 ? ROAD_R + SHOULDER_W * 0.7 : ROAD_L - SHOULDER_W * 0.7;
    utilityPoles.push({ x, y, side });
  }
  for (let y = -100; y < H + 200; y += rng(40, 90)) {
    const side = Math.random() < 0.5 ? -1 : 1;
    const x = side > 0 ? ROAD_R + rng(5, SHOULDER_W - 10) : ROAD_L - rng(5, SHOULDER_W - 10);
    deadShrubs.push({ x, y, size: rng(5, 12) });
  }
  for (let i = 0; i < 3; i++) {
    tumbleweeds.push({ x: rng(ROAD_L - SHOULDER_W, ROAD_R + SHOULDER_W), y: rng(0, H), vx: rng(0.3, 1.2) * (Math.random() < 0.5 ? 1 : -1), size: rng(7, 13) });
  }
  for (let y = -50; y < H + 100; y += rng(30, 70)) {
    const side = Math.random() < 0.5 ? -1 : 1;
    sandDrifts.push({ x: side > 0 ? ROAD_R - rng(0, 15) : ROAD_L + rng(0, 15), y, w: rng(20, 50), h: rng(6, 14) });
  }
  for (let y = -50; y < H + 100; y += rng(8, 25)) {
    desertCracks.push({ x: ROAD_L + rng(5, ROAD_W - 5), y, len: rng(8, 25), angle: rng(-0.5, 0.5) });
  }
}

function initForestObjects() {
  trees = []; streetLamps = []; fallenLogs = []; undergrowth = [];
  roadMarkers = []; fallenLeaves = []; treeShadows = []; dappleSpots = [];
  for (let y = -100; y < H + 200; y += rng(30, 55)) {
    for (let side = -1; side <= 1; side += 2) {
      const baseX = side > 0 ? ROAD_R + rng(15, SHOULDER_W + 40) : ROAD_L - rng(15, SHOULDER_W + 40);
      trees.push({ x: baseX, y, layer: 0, canopyR: rng(18, 30), trunkH: rng(10, 18), side });
      if (Math.random() < 0.6) {
        const x2 = side > 0 ? ROAD_R + rng(5, SHOULDER_W) : ROAD_L - rng(5, SHOULDER_W);
        trees.push({ x: x2, y: y + rng(-10, 10), layer: 1, canopyR: rng(24, 40), trunkH: rng(12, 22), side });
      }
    }
  }
  for (let y = -100; y < H + 200; y += rng(250, 320)) {
    const side = y % 560 < 280 ? 1 : -1;
    const x = side > 0 ? ROAD_R - 4 : ROAD_L + 4;
    streetLamps.push({ x, y, side });
  }
  for (let y = -100; y < H + 200; y += rng(120, 220)) {
    const side = Math.random() < 0.5 ? 1 : -1;
    const x = side > 0 ? ROAD_R + rng(8, SHOULDER_W - 5) : ROAD_L - rng(8, SHOULDER_W - 5);
    fallenLogs.push({ x, y, w: rng(25, 50), side });
  }
  for (let y = -100; y < H + 200; y += rng(18, 35)) {
    for (let side = -1; side <= 1; side += 2) {
      const x = side > 0 ? ROAD_R + rng(4, SHOULDER_W - 4) : ROAD_L - rng(4, SHOULDER_W - 4);
      undergrowth.push({ x, y, w: rng(8, 20), h: rng(5, 12) });
    }
  }
  for (let y = -100; y < H + 200; y += rng(80, 160)) {
    const side = Math.random() < 0.5 ? 1 : -1;
    const x = side > 0 ? ROAD_R + 2 : ROAD_L - 6;
    roadMarkers.push({ x, y, side });
  }
  for (let i = 0; i < 35; i++) {
    fallenLeaves.push({ x: ROAD_L + rng(0, ROAD_W), y: rng(-50, H + 50), rot: rng(0, Math.PI * 2), color: pick(['#aa8822', '#886611', '#cc9933', '#997722']), size: rng(3, 6) });
  }
  for (let i = 0; i < 12; i++) {
    treeShadows.push({ y: rng(-50, H + 50), w: rng(40, ROAD_W * 0.6), angle: rng(-0.3, 0.3) });
  }
  for (let i = 0; i < 20; i++) {
    dappleSpots.push({ x: ROAD_L + rng(0, ROAD_W), y: rng(-50, H + 50), r: rng(4, 12) });
  }
}

initDesertObjects();
initForestObjects();

// ═══════════ PLAYER ═══════════
const player = {
  x: 0, y: 0, targetX: 0, lane: 1,
  w: 32, h: 52, moving: false
};

function resetPlayer() {
  player.lane = 1;
  player.x = ROAD_L + LANE_W * player.lane + LANE_W / 2;
  player.targetX = player.x;
  player.y = H - 120;
}

// ═══════════ ENEMIES ═══════════
let enemies = [];
const ENEMY_TYPES = [
  { name: 'sedan', w: 28, h: 46 },
  { name: 'minivan', w: 34, h: 58 },
  { name: 'motorcycle', w: 14, h: 30 }
];

function spawnEnemy() {
  const typeIdx = pick(enemyTypePool);
  const type = ENEMY_TYPES[typeIdx];
  const lane = rngI(0, NUM_LANES);
  const x = ROAD_L + LANE_W * lane + LANE_W / 2;
  for (const e of enemies) {
    if (Math.abs(e.x - x) < LANE_W * 0.5 && e.y < type.h + 80) return;
  }
  enemies.push({
    type: typeIdx, x, y: -type.h - 10, w: type.w, h: type.h,
    lane, speed: speed * rng(0.55, 0.78), drift: rng(0, Math.PI * 2),
    driftAmp: typeIdx === 2 ? rng(2, 5) : rng(1, 4), passed: false
  });
}

// ═══════════ AUDIO SYSTEM ═══════════
let audioCtx = null, audioStarted = false;
let engineOsc, engineGain;
let ambientDesertOsc, ambientDesertGain;
let ambientForestOsc, ambientForestGain, ambientForestOsc2, ambientForestGain2;

function initAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioStarted = true;

  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  engineGain.gain.value = 0.04;
  engineOsc.connect(engineGain).connect(audioCtx.destination);
  engineOsc.start();

  ambientDesertOsc = audioCtx.createOscillator();
  ambientDesertGain = audioCtx.createGain();
  ambientDesertOsc.type = 'sawtooth';
  ambientDesertOsc.frequency.value = 3200;
  ambientDesertGain.gain.value = 0.012;
  const desFilter = audioCtx.createBiquadFilter();
  desFilter.type = 'highpass';
  desFilter.frequency.value = 2800;
  ambientDesertOsc.connect(desFilter).connect(ambientDesertGain).connect(audioCtx.destination);
  ambientDesertOsc.start();

  ambientForestOsc = audioCtx.createOscillator();
  ambientForestGain = audioCtx.createGain();
  ambientForestOsc.type = 'triangle';
  ambientForestOsc.frequency.value = 120;
  ambientForestGain.gain.value = 0;
  const forFilter = audioCtx.createBiquadFilter();
  forFilter.type = 'lowpass';
  forFilter.frequency.value = 400;
  ambientForestOsc.connect(forFilter).connect(ambientForestGain).connect(audioCtx.destination);
  ambientForestOsc.start();

  ambientForestOsc2 = audioCtx.createOscillator();
  ambientForestGain2 = audioCtx.createGain();
  ambientForestOsc2.type = 'sawtooth';
  ambientForestOsc2.frequency.value = 80;
  ambientForestGain2.gain.value = 0;
  const forFilter2 = audioCtx.createBiquadFilter();
  forFilter2.type = 'lowpass';
  forFilter2.frequency.value = 200;
  ambientForestOsc2.connect(forFilter2).connect(ambientForestGain2).connect(audioCtx.destination);
  ambientForestOsc2.start();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  if (type === 'collision') {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const d = audioCtx.createBiquadFilter();
    d.type = 'lowpass'; d.frequency.value = 800;
    o.type = 'sawtooth'; o.frequency.value = 150;
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    o.connect(d).connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 0.35);
  } else if (type === 'nearmiss') {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(1200, now);
    o.frequency.exponentialRampToValueAtTime(1800, now + 0.08);
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 0.12);
  } else if (type === 'nitro') {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now);
    o.frequency.exponentialRampToValueAtTime(1200, now + 0.5);
    g.gain.setValueAtTime(0.08, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 0.6);
  } else if (type === 'whoosh') {
    const bufLen = audioCtx.sampleRate * 0.4;
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 1000; f.Q.value = 2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.connect(f).connect(g).connect(audioCtx.destination);
    src.start(now); src.stop(now + 0.4);
  }
}

function updateAudio(dt) {
  if (!audioCtx) return;
  const desertVol = transitioning ? lerp(currentBiome === BIOME.DESERT ? 0.012 : 0, currentBiome === BIOME.DESERT ? 0 : 0.012, transitionProgress) : (currentBiome === BIOME.DESERT ? 0.012 : 0);
  const forestVol = transitioning ? lerp(currentBiome === BIOME.FOREST ? 0.012 : 0, currentBiome === BIOME.FOREST ? 0 : 0.012, transitionProgress) : (currentBiome === BIOME.FOREST ? 0.012 : 0);
  ambientDesertGain.gain.value = desertVol;
  ambientForestGain.gain.value = forestVol;
  ambientForestGain2.gain.value = forestVol * 0.6;
  const ef = 60 + speed * 18 + (nitroActive ? 40 : 0);
  engineOsc.frequency.value = ef;
  engineGain.gain.value = gameState === STATE.PLAYING ? 0.035 : 0.01;
}

// ═══════════ INPUT ═══════════
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter') {
    if (gameState === STATE.MENU) startGame();
    else if (gameState === STATE.GAMEOVER) startGame();
  }
  if (e.code === 'KeyP' && gameState === STATE.PLAYING) { gameState = STATE.PAUSED; }
  else if (e.code === 'KeyP' && gameState === STATE.PAUSED) { gameState = STATE.PLAYING; }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (gameState === STATE.MENU || gameState === STATE.GAMEOVER) { startGame(); return; }
  if (gameState !== STATE.PLAYING) return;
  const t = e.touches[0];
  const rx = t.clientX / W;
  if (rx < 0.33) moveLeft();
  else if (rx > 0.66) moveRight();
  else activateNitro();
}, { passive: false });
canvas.addEventListener('click', () => initAudio());

function moveLeft() {
  if (player.lane > 0) {
    player.lane--;
    player.targetX = ROAD_L + LANE_W * player.lane + LANE_W / 2;
  }
}
function moveRight() {
  if (player.lane < NUM_LANES - 1) {
    player.lane++;
    player.targetX = ROAD_L + LANE_W * player.lane + LANE_W / 2;
  }
}
function activateNitro() {
  if (!nitroActive && nitroCooldown <= 0) {
    nitroActive = true;
    nitroTimer = 2.5;
    nitroCooldown = 6;
    multiplier = 1.5;
    playSound('nitro');
  }
}

// ═══════════ GAME FLOW ═══════════
function startGame() {
  initAudio();
  gameState = STATE.PLAYING;
  score = 0; distance = 0; lives = 3;
  speed = baseSpeed; scrollOffset = 0; gameTime = 0;
  nitroActive = false; nitroCooldown = 0; nitroTimer = 0;
  invincible = false; invTimer = 0; flashCount = 0;
  shakeTimer = 0; redVignette = 0; nearMissFlash = 0;
  multiplier = 1; biomeTransitions = 0;
  difficultyTimer = 0; spawnRate = 0.018; speedCap = 1.3;
  enemyTypePool = [0];
  currentBiome = BIOME.DESERT; nextBiome = BIOME.FOREST;
  transitioning = false; transitionProgress = 0; biomeTimer = 0;
  enemies = [];
  resetPlayer();
  initDesertObjects();
  initForestObjects();
  biomeBadge = { show: true, alpha: 0, y: -40, timer: 3, name: 'DESERT HIGHWAY', color: '#cc8833' };
}

function hitPlayer() {
  if (invincible) return;
  lives--;
  playSound('collision');
  shakeTimer = 0.4;
  redVignette = 1;
  invincible = true;
  invTimer = 1.5;
  flashCount = 0;
  if (lives <= 0) {
    gameState = STATE.GAMEOVER;
    if (score > bestScore) { bestScore = score; localStorage.setItem('roadEscapeBest', bestScore); }
  }
}

// ═══════════ UPDATE ═══════════
function update(dt) {
  if (gameState === STATE.MENU) {
    menuScroll += 1.5 * dt * 60;
    return;
  }
  if (gameState !== STATE.PLAYING) return;

  gameTime += dt;
  totalTime += dt;

  // Speed
  const spdMult = nitroActive ? 1.8 : 1;
  speed = baseSpeed * spdMult * Math.min(speedCap, 1 + gameTime * 0.003);
  scrollOffset += speed * dt * 60;
  distance += speed * dt * 0.6;
  score += Math.floor(speed * dt * 6 * multiplier);

  // Difficulty
  difficultyTimer += dt;
  if (difficultyTimer > 20) {
    difficultyTimer -= 20;
    spawnRate = Math.min(0.06, spawnRate * 1.1);
    speedCap += 0.05;
  }
  if (gameTime > 60 && !enemyTypePool.includes(1)) enemyTypePool.push(1);
  if (gameTime > 120 && !enemyTypePool.includes(2)) enemyTypePool.push(2);

  // Nitro
  if (nitroActive) {
    nitroTimer -= dt;
    if (nitroTimer <= 0) { nitroActive = false; multiplier = 1; }
  }
  if (nitroCooldown > 0) nitroCooldown -= dt;

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA']) moveLeft();
  if (keys['ArrowRight'] || keys['KeyD']) moveRight();
  if (keys['Space']) activateNitro();
  keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
  keys['KeyA'] = false; keys['KeyD'] = false;
  keys['Space'] = false;

  const moveSpeed = 12 * dt * 60;
  const dx = player.targetX - player.x;
  if (Math.abs(dx) > 1) player.x += dx * Math.min(1, moveSpeed * 0.08);
  else player.x = player.targetX;

  // Invincibility
  if (invincible) {
    invTimer -= dt;
    flashCount += dt * 16;
    if (invTimer <= 0) { invincible = false; flashCount = 0; }
  }
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    shakeX = (Math.random() - 0.5) * 8;
    shakeY = (Math.random() - 0.5) * 8;
  } else { shakeX = 0; shakeY = 0; }
  if (redVignette > 0) redVignette -= dt * 2;
  if (nearMissFlash > 0) nearMissFlash -= dt * 2;

  // Enemies
  if (Math.random() < spawnRate * dt * 60) spawnEnemy();
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += (speed - e.speed) * dt * 60;
    e.drift += dt * 2;
    const baseLaneX = ROAD_L + LANE_W * e.lane + LANE_W / 2;
    e.x = baseLaneX + Math.sin(e.drift) * e.driftAmp;

    if (e.y > H + 60) { enemies.splice(i, 1); continue; }

    // Collision
    if (!invincible && !e.passed) {
      const pw = player.w * 0.4, ph = player.h * 0.4;
      const ew = e.w * 0.4, eh = e.h * 0.4;
      if (Math.abs(player.x - e.x) < pw + ew && Math.abs(player.y - e.y) < ph + eh) {
        hitPlayer();
      }
    }

    // Near miss
    if (!e.passed && e.y > player.y + player.h / 2) {
      e.passed = true;
      const dist = Math.abs(player.x - e.x);
      if (dist < player.w * 0.5 + e.w * 0.5 + 12 && dist > player.w * 0.3 + e.w * 0.3) {
        score += Math.floor(50 * multiplier);
        nearMissFlash = 1;
        nearMissText = '+50 NEAR MISS!';
        playSound('nearmiss');
      }
    }
  }

  // Biome
  biomeTimer += dt;
  if (!transitioning && biomeTimer >= BIOME_DURATION) {
    transitioning = true;
    transitionProgress = 0;
    nextBiome = currentBiome === BIOME.DESERT ? BIOME.FOREST : BIOME.DESERT;
    playSound('whoosh');
  }
  if (transitioning) {
    transitionProgress += dt / TRANSITION_DURATION;
    if (transitionProgress >= 1) {
      transitionProgress = 1;
      transitioning = false;
      currentBiome = nextBiome;
      biomeTimer = 0;
      biomeTransitions++;
      score += 200;
      const isDesert = currentBiome === BIOME.DESERT;
      biomeBadge = {
        show: true, alpha: 0, y: -40, timer: 3,
        name: isDesert ? 'DESERT HIGHWAY' : 'FOREST ROAD',
        color: isDesert ? '#cc8833' : '#336622'
      };
    }
  }

  // Badge animation
  if (biomeBadge.show) {
    biomeBadge.timer -= dt;
    if (biomeBadge.timer > 1) {
      biomeBadge.alpha = Math.min(1, biomeBadge.alpha + dt * 3);
      biomeBadge.y = lerp(biomeBadge.y, 12, dt * 6);
    } else if (biomeBadge.timer > 0) {
      biomeBadge.alpha = Math.max(0, biomeBadge.alpha - dt * 2);
      biomeBadge.y -= dt * 30;
    } else {
      biomeBadge.show = false;
    }
  }

  // Tumbleweeds
  for (const tw of tumbleweeds) {
    tw.x += tw.vx * dt * 60;
    tw.y += speed * dt * 60 * 0.5;
    if (tw.y > H + 20) { tw.y = -20; tw.x = rng(ROAD_L - SHOULDER_W, ROAD_R + SHOULDER_W); }
    if (tw.x > ROAD_R + SHOULDER_W + 20 || tw.x < ROAD_L - SHOULDER_W - 20) {
      tw.x = Math.random() < 0.5 ? ROAD_L - SHOULDER_W : ROAD_R + SHOULDER_W;
      tw.vx = -tw.vx;
    }
  }
}

// ═══════════ DRAWING HELPERS ═══════════
function drawRoundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ═══════════ DRAW DESERT BIOME ═══════════
function drawDesert(c, scroll, alpha) {
  if (alpha <= 0) return;
  c.save();
  c.globalAlpha = alpha;

  // Sky / ground
  c.fillStyle = '#c8a060';
  c.fillRect(0, 0, W, H);

  // Shoulder texture
  const shoulderL = ROAD_L - SHOULDER_W;
  const shoulderR = ROAD_R;
  for (let side = 0; side < 2; side++) {
    const sx = side === 0 ? shoulderL : shoulderR;
    const sw = side === 0 ? SHOULDER_W : SHOULDER_W;
    c.fillStyle = '#c8a060';
    c.fillRect(sx, 0, sw, H);
    c.strokeStyle = '#aa8844';
    c.lineWidth = 1;
    const off = scroll % 50;
    for (let y = -50 + off; y < H + 50; y += 25) {
      const seed = Math.sin(y * 73.17 + side * 999) * 0.5 + 0.5;
      const x1 = sx + 4 + seed * (sw - 8);
      const x2 = sx + 4 + Math.sin(y * 37.3) * 0.5 * (sw - 8) + (sw - 8) * 0.25;
      c.beginPath();
      c.moveTo(x1, y);
      c.lineTo(x2, y + 8 + seed * 10);
      c.stroke();
    }
    c.fillStyle = '#aa7744';
    for (let y = -30 + (scroll % 80); y < H + 30; y += 80) {
      const rx = sx + (side === 0 ? sw * 0.3 : sw * 0.6) + Math.sin(y * 0.1) * 10;
      const rs = 5 + Math.sin(y * 2.7) * 2;
      c.beginPath();
      c.ellipse(rx, y, rs, rs * 0.75, 0, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#cc9966';
      c.beginPath();
      c.ellipse(rx - 2, y - 2, 3, 2, 0, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#aa7744';
    }
  }

  // Road surface
  const stripH = 8;
  const colors = ['#4a4a3a', '#525248'];
  const roadOff = scroll % (stripH * 2);
  for (let y = -stripH * 2 + roadOff; y < H + stripH; y += stripH) {
    const idx = Math.floor((y - roadOff) / stripH) & 1;
    c.fillStyle = colors[idx];
    c.fillRect(ROAD_L, y, ROAD_W, stripH);
  }

  // Road cracks
  c.strokeStyle = '#333328';
  c.lineWidth = 0.7;
  const crackOff = scroll % 400;
  for (const cr of desertCracks) {
    const cy = ((cr.y + crackOff) % (H + 100)) - 50;
    c.beginPath();
    c.moveTo(cr.x, cy);
    c.lineTo(cr.x + Math.cos(cr.angle) * cr.len, cy + Math.sin(cr.angle) * cr.len + cr.len * 0.5);
    c.stroke();
  }

  // Sand drifts on road edges
  for (const sd of sandDrifts) {
    const sy = ((sd.y + scroll * 0.8) % (H + 150)) - 50;
    c.fillStyle = 'rgba(221,187,136,0.13)';
    c.beginPath();
    c.ellipse(sd.x, sy, sd.w, sd.h, 0, 0, Math.PI * 2);
    c.fill();
  }

  // Edge lines
  c.strokeStyle = '#ffffff';
  c.lineWidth = 2;
  c.beginPath(); c.moveTo(ROAD_L, 0); c.lineTo(ROAD_L, H); c.stroke();
  c.beginPath(); c.moveTo(ROAD_R, 0); c.lineTo(ROAD_R, H); c.stroke();

  // Center divider (yellow dashed)
  c.strokeStyle = '#ffdd00';
  c.lineWidth = 2.5;
  c.setLineDash([20, 10]);
  c.lineDashOffset = -scroll;
  const cx = (ROAD_L + ROAD_R) / 2;
  c.beginPath(); c.moveTo(cx, 0); c.lineTo(cx, H); c.stroke();

  // Lane separators (white dashed)
  c.strokeStyle = 'rgba(255,255,255,0.5)';
  c.lineWidth = 1.5;
  c.setLineDash([12, 10]);
  for (let i = 1; i < NUM_LANES; i++) {
    const lx = ROAD_L + LANE_W * i;
    if (Math.abs(lx - cx) < 5) continue;
    c.beginPath(); c.moveTo(lx, 0); c.lineTo(lx, H); c.stroke();
  }
  c.setLineDash([]);

  // Rock formations (behind cacti)
  for (const rg of rocks) {
    const ry = ((rg.y + scroll) % (H + 300)) - 100;
    for (const r of rg.cluster) {
      c.fillStyle = '#aa6633';
      c.beginPath();
      c.moveTo(rg.x + r.dx, ry + r.dy - r.h / 2);
      c.lineTo(rg.x + r.dx + r.w / 2, ry + r.dy - r.h);
      c.lineTo(rg.x + r.dx + r.w, ry + r.dy - r.h / 3);
      c.lineTo(rg.x + r.dx + r.w * 0.8, ry + r.dy + r.h / 2);
      c.lineTo(rg.x + r.dx - r.w * 0.1, ry + r.dy + r.h / 3);
      c.closePath();
      c.fill();
      c.fillStyle = '#cc8844';
      c.beginPath();
      c.moveTo(rg.x + r.dx + 2, ry + r.dy - r.h / 2 + 2);
      c.lineTo(rg.x + r.dx + r.w / 2 - 1, ry + r.dy - r.h + 3);
      c.lineTo(rg.x + r.dx + r.w - 3, ry + r.dy - r.h / 3 + 2);
      c.closePath();
      c.fill();
    }
  }

  // Dead shrubs
  for (const ds of deadShrubs) {
    const dy = ((ds.y + scroll) % (H + 200)) - 100;
    c.fillStyle = '#665522';
    c.beginPath();
    c.moveTo(ds.x, dy);
    c.lineTo(ds.x - ds.size * 0.6, dy - ds.size);
    c.lineTo(ds.x - ds.size * 0.2, dy - ds.size * 0.5);
    c.lineTo(ds.x + ds.size * 0.3, dy - ds.size * 1.1);
    c.lineTo(ds.x + ds.size * 0.4, dy - ds.size * 0.4);
    c.lineTo(ds.x + ds.size * 0.7, dy - ds.size * 0.8);
    c.lineTo(ds.x + ds.size * 0.2, dy);
    c.closePath();
    c.fill();
  }

  // Cacti
  for (const ca of cacti) {
    const cy = ((ca.y + scroll) % (H + 300)) - 100;
    const tw = 6, armW = 5;
    c.fillStyle = '#3a6b2a';
    c.fillRect(ca.x - tw / 2, cy - ca.h, tw, ca.h);
    if (ca.h > 15) {
      c.fillRect(ca.x - tw / 2 - armW, cy - ca.h * 0.65, armW, ca.h * 0.2);
      c.fillRect(ca.x - tw / 2 - armW, cy - ca.h * 0.65 - armW * 1.5, armW, armW * 1.5);
    }
    if (ca.h > 22) {
      c.fillRect(ca.x + tw / 2, cy - ca.h * 0.45, armW, ca.h * 0.2);
      c.fillRect(ca.x + tw / 2, cy - ca.h * 0.45 - armW * 1.2, armW, armW * 1.2);
    }
    c.fillStyle = '#2d5521';
    c.fillRect(ca.x - 1, cy - ca.h, 2, ca.h);
  }

  // Utility poles + wires
  const poleOff = scroll % 180;
  let prevPole = null;
  for (let y = -180 + poleOff; y < H + 180; y += 180) {
    const side = (Math.floor((y - poleOff) / 180)) % 2 === 0 ? 1 : -1;
    const px = side > 0 ? ROAD_R + SHOULDER_W * 0.7 : ROAD_L - SHOULDER_W * 0.7;
    c.strokeStyle = '#777766';
    c.lineWidth = 2;
    c.beginPath(); c.moveTo(px, y); c.lineTo(px, y - 50); c.stroke();
    c.beginPath(); c.moveTo(px - 10, y - 48); c.lineTo(px + 10, y - 48); c.stroke();
    if (prevPole) {
      c.strokeStyle = 'rgba(102,102,85,0.26)';
      c.lineWidth = 0.7;
      c.beginPath();
      c.moveTo(prevPole.x, prevPole.y - 48);
      const midY = (prevPole.y - 48 + y - 48) / 2 + 15;
      c.quadraticCurveTo((prevPole.x + px) / 2, midY, px, y - 48);
      c.stroke();
    }
    prevPole = { x: px, y };
  }

  // Road signs
  for (const rs of roadSigns) {
    const ry = ((rs.y + scroll) % (H + 340)) - 100;
    c.fillStyle = '#888888';
    c.fillRect(rs.x + 10, ry - 30, 3, 30);
    c.fillStyle = '#22aa22';
    c.fillRect(rs.x, ry - 48, 24, 18);
    c.strokeStyle = '#ffffff';
    c.lineWidth = 1;
    c.strokeRect(rs.x + 1, ry - 47, 22, 16);
    c.fillStyle = '#ffffff';
    c.font = '7px monospace';
    c.textAlign = 'center';
    c.fillText(rs.text, rs.x + 12, ry - 36);
  }

  // Tumbleweeds
  for (const tw of tumbleweeds) {
    c.fillStyle = '#887733';
    c.beginPath();
    c.arc(tw.x, tw.y, tw.size, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#665522';
    c.lineWidth = 0.5;
    c.stroke();
  }

  // Heat shimmer
  const shimmerY = H * 0.05;
  for (let i = 0; i < 3; i++) {
    c.strokeStyle = 'rgba(255,255,255,0.03)';
    c.lineWidth = 3;
    c.beginPath();
    for (let x = ROAD_L; x < ROAD_R; x += 4) {
      const sy = shimmerY + i * 12 + Math.sin(x * 0.05 + totalTime * 1.5 + i) * 3;
      if (x === ROAD_L) c.moveTo(x, sy); else c.lineTo(x, sy);
    }
    c.stroke();
  }

  // Sun glare
  const grd = c.createRadialGradient(W / 2, 0, 0, W / 2, 0, H * 0.4);
  grd.addColorStop(0, 'rgba(255,255,255,0.04)');
  grd.addColorStop(1, 'rgba(255,255,255,0)');
  c.fillStyle = grd;
  c.fillRect(0, 0, W, H * 0.4);

  c.restore();
}

// ═══════════ DRAW FOREST BIOME ═══════════
function drawForest(c, scroll, alpha) {
  if (alpha <= 0) return;
  c.save();
  c.globalAlpha = alpha;

  // Dark forest floor
  c.fillStyle = '#152010';
  c.fillRect(0, 0, W, H);

  // Road surface
  const stripH = 8;
  const colors = ['#2e3028', '#333830'];
  const roadOff = scroll % (stripH * 2);
  for (let y = -stripH * 2 + roadOff; y < H + stripH; y += stripH) {
    const idx = Math.floor((y - roadOff) / stripH) & 1;
    c.fillStyle = colors[idx];
    c.fillRect(ROAD_L, y, ROAD_W, stripH);
  }

  // Tree shadows on road
  for (const ts of treeShadows) {
    const ty = ((ts.y + scroll * 0.9) % (H + 100)) - 50;
    c.save();
    c.translate(ROAD_L + ROAD_W / 2, ty);
    c.rotate(ts.angle);
    c.fillStyle = 'rgba(0,0,0,0.09)';
    c.fillRect(-ts.w / 2, -4, ts.w, 8);
    c.restore();
  }

  // Dapple light spots
  for (const dp of dappleSpots) {
    const dy = ((dp.y + scroll * 0.85) % (H + 100)) - 50;
    c.fillStyle = 'rgba(255,238,170,0.03)';
    c.beginPath();
    c.arc(dp.x, dy, dp.r, 0, Math.PI * 2);
    c.fill();
  }

  // Fallen leaves
  for (const lf of fallenLeaves) {
    const ly = ((lf.y + scroll) % (H + 100)) - 50;
    c.save();
    c.translate(lf.x, ly);
    c.rotate(lf.rot);
    c.fillStyle = lf.color;
    c.beginPath();
    c.ellipse(0, 0, lf.size, lf.size * 0.5, 0, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  // Edge lines
  c.strokeStyle = '#ffffff';
  c.lineWidth = 2;
  c.beginPath(); c.moveTo(ROAD_L, 0); c.lineTo(ROAD_L, H); c.stroke();
  c.beginPath(); c.moveTo(ROAD_R, 0); c.lineTo(ROAD_R, H); c.stroke();

  // Center divider
  c.strokeStyle = '#ccbb44';
  c.lineWidth = 2.5;
  c.setLineDash([20, 10]);
  c.lineDashOffset = -scroll;
  const cx = (ROAD_L + ROAD_R) / 2;
  c.beginPath(); c.moveTo(cx, 0); c.lineTo(cx, H); c.stroke();

  // Lane separators
  c.strokeStyle = 'rgba(255,255,255,0.4)';
  c.lineWidth = 1.5;
  c.setLineDash([12, 10]);
  for (let i = 1; i < NUM_LANES; i++) {
    const lx = ROAD_L + LANE_W * i;
    if (Math.abs(lx - cx) < 3) continue;
    c.beginPath(); c.moveTo(lx, 0); c.lineTo(lx, H); c.stroke();
  }
  c.setLineDash([]);

  // Undergrowth
  for (const ug of undergrowth) {
    const uy = ((ug.y + scroll) % (H + 200)) - 100;
    c.fillStyle = '#0d1f08';
    c.beginPath();
    c.ellipse(ug.x, uy, ug.w, ug.h, 0, 0, Math.PI * 2);
    c.fill();
  }

  // Trees — back layer
  for (const tr of trees) {
    if (tr.layer !== 0) continue;
    const ty = ((tr.y + scroll) % (H + 300)) - 100;
    c.fillStyle = '#3a2a1a';
    c.fillRect(tr.x - 3, ty - tr.trunkH, 6, tr.trunkH);
    c.fillStyle = '#0d1a08';
    c.beginPath();
    c.ellipse(tr.x, ty - tr.trunkH - tr.canopyR * 0.5, tr.canopyR, tr.canopyR * 0.8, 0, 0, Math.PI * 2);
    c.fill();
  }

  // Trees — front layer
  for (const tr of trees) {
    if (tr.layer !== 1) continue;
    const ty = ((tr.y + scroll) % (H + 300)) - 100;
    c.fillStyle = '#4a3a2a';
    c.fillRect(tr.x - 4, ty - tr.trunkH, 8, tr.trunkH);
    c.fillStyle = '#152810';
    c.beginPath();
    c.ellipse(tr.x, ty - tr.trunkH - tr.canopyR * 0.4, tr.canopyR, tr.canopyR * 0.75, 0, 0, Math.PI * 2);
    c.fill();
  }

  // Fallen logs
  for (const fl of fallenLogs) {
    const fy = ((fl.y + scroll) % (H + 320)) - 100;
    c.fillStyle = '#4a3a1a';
    c.fillRect(fl.x - fl.w / 2, fy - 4, fl.w, 8);
    c.strokeStyle = '#3a2a10';
    c.lineWidth = 0.5;
    for (let i = 0; i < fl.w; i += 6) {
      c.beginPath();
      c.moveTo(fl.x - fl.w / 2 + i, fy - 4);
      c.lineTo(fl.x - fl.w / 2 + i, fy + 4);
      c.stroke();
    }
  }

  // Street lamps
  for (const sl of streetLamps) {
    const sy = ((sl.y + scroll) % (H + 420)) - 100;
    c.strokeStyle = '#667755';
    c.lineWidth = 3;
    c.beginPath(); c.moveTo(sl.x, sy); c.lineTo(sl.x, sy - 40); c.stroke();
    const armDir = sl.side;
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(sl.x, sy - 38);
    c.lineTo(sl.x + armDir * 15, sy - 40);
    c.stroke();
    c.fillStyle = '#ffeeaa';
    c.beginPath();
    c.arc(sl.x + armDir * 15, sy - 40, 3, 0, Math.PI * 2);
    c.fill();
    // Light cone
    c.fillStyle = 'rgba(255,238,170,0.07)';
    c.beginPath();
    c.moveTo(sl.x + armDir * 12, sy - 36);
    c.lineTo(sl.x + armDir * 30, sy + 20);
    c.lineTo(sl.x - armDir * 5, sy + 20);
    c.closePath();
    c.fill();
  }

  // Road markers
  for (const rm of roadMarkers) {
    const ry = ((rm.y + scroll) % (H + 260)) - 100;
    c.fillStyle = '#cc4444';
    c.fillRect(rm.x, ry - 8, 4, 12);
  }

  // Ambient overlay
  c.fillStyle = 'rgba(0,0,26,0.13)';
  c.fillRect(0, 0, W, H);

  c.restore();
}

// ═══════════ DRAW PLAYER CAR ═══════════
function drawPlayerCar(c, px, py) {
  if (invincible && Math.floor(flashCount) % 2 === 0) return;
  const w = player.w, h = player.h;
  const x = px - w / 2, y = py - h / 2;

  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.27)';
  c.beginPath();
  c.ellipse(px + 3, py + 6, w * 0.6, h * 0.45, 0, 0, Math.PI * 2);
  c.fill();

  // Body
  c.fillStyle = '#1a5522';
  drawRoundRect(c, x, y, w, h, 5);
  c.fill();

  // Hood (top 35%)
  c.fillStyle = '#1f6628';
  drawRoundRect(c, x + 2, y, w - 4, h * 0.35, 4);
  c.fill();

  // Side skirts
  c.fillStyle = '#133d19';
  c.fillRect(x, y + h * 0.2, 3, h * 0.6);
  c.fillRect(x + w - 3, y + h * 0.2, 3, h * 0.6);

  // Windshield
  c.fillStyle = 'rgba(85,136,170,0.7)';
  c.beginPath();
  c.moveTo(x + 5, y + h * 0.3);
  c.lineTo(x + w - 5, y + h * 0.3);
  c.lineTo(x + w - 7, y + h * 0.45);
  c.lineTo(x + 7, y + h * 0.45);
  c.closePath();
  c.fill();

  // Sunroof
  c.fillStyle = '#0d2a10';
  c.fillRect(x + 8, y + h * 0.46, w - 16, h * 0.12);
  c.fillStyle = 'rgba(136,170,187,0.5)';
  c.fillRect(x + 10, y + h * 0.47, w - 20, h * 0.1);

  // Rear window
  c.fillStyle = 'rgba(68,119,102,0.6)';
  c.beginPath();
  c.moveTo(x + 7, y + h * 0.62);
  c.lineTo(x + w - 7, y + h * 0.62);
  c.lineTo(x + w - 5, y + h * 0.73);
  c.lineTo(x + 5, y + h * 0.73);
  c.closePath();
  c.fill();

  // Spoiler
  c.fillStyle = '#0a1f0a';
  c.fillRect(x + 3, y + h - 5, 4, 4);
  c.fillRect(x + w - 7, y + h - 5, 4, 4);
  c.fillRect(x + 2, y + h - 6, w - 4, 2);

  // Side mirrors
  c.fillStyle = '#0f3318';
  c.fillRect(x - 3, y + h * 0.28, 4, 3);
  c.fillRect(x + w - 1, y + h * 0.28, 4, 3);

  // Wheels
  const wheelPositions = [
    [x + 1, y + 5], [x + w - 8, y + 5],
    [x + 1, y + h - 10], [x + w - 8, y + h - 10]
  ];
  for (const [wx, wy] of wheelPositions) {
    c.fillStyle = '#111111';
    c.beginPath();
    c.ellipse(wx + 3.5, wy + 2.5, 3.5, 2.5, 0, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#888888';
    c.beginPath();
    c.ellipse(wx + 3.5, wy + 2.5, 2.2, 1.6, 0, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#666666';
    c.lineWidth = 0.5;
    c.beginPath();
    c.moveTo(wx + 1.5, wy + 2.5); c.lineTo(wx + 5.5, wy + 2.5);
    c.moveTo(wx + 3.5, wy + 1); c.lineTo(wx + 3.5, wy + 4);
    c.stroke();
    c.fillStyle = '#aaaaaa';
    c.beginPath();
    c.arc(wx + 3.5, wy + 2.5, 0.8, 0, Math.PI * 2);
    c.fill();
  }

  // Headlights
  c.fillStyle = '#ffffcc';
  c.fillRect(x + 4, y, 6, 3);
  c.fillRect(x + w - 10, y, 6, 3);

  // Headlight cones
  c.fillStyle = 'rgba(255,238,170,0.04)';
  c.beginPath();
  c.moveTo(x + 4, y);
  c.lineTo(x - 8, y - 60);
  c.lineTo(x + 14, y - 60);
  c.closePath();
  c.fill();
  c.beginPath();
  c.moveTo(x + w - 10, y);
  c.lineTo(x + w - 18, y - 60);
  c.lineTo(x + w + 4, y - 60);
  c.closePath();
  c.fill();

  // Taillights
  const braking = !nitroActive;
  c.fillStyle = braking ? '#ff3333' : '#cc2222';
  c.fillRect(x + 3, y + h - 4, 6, 3);
  c.fillRect(x + w - 9, y + h - 4, 6, 3);
  if (braking) {
    c.fillStyle = 'rgba(255,51,51,0.15)';
    c.beginPath();
    c.arc(x + 6, y + h, 8, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.arc(x + w - 6, y + h, 8, 0, Math.PI * 2);
    c.fill();
  }
}

// ═══════════ DRAW ENEMY CARS ═══════════
function drawEnemyCar(c, e) {
  const x = e.x - e.w / 2, y = e.y - e.h / 2;

  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.22)';
  c.beginPath();
  c.ellipse(e.x + 3, e.y + 5, e.w * 0.55, e.h * 0.4, 0, 0, Math.PI * 2);
  c.fill();

  if (e.type === 0) {
    // SEDAN
    c.fillStyle = '#334466';
    drawRoundRect(c, x, y, e.w, e.h, 4);
    c.fill();
    c.fillStyle = '#223355';
    drawRoundRect(c, x + 3, y + e.h * 0.3, e.w - 6, e.h * 0.3, 3);
    c.fill();
    // Rear windshield
    c.fillStyle = 'rgba(102,136,170,0.65)';
    c.beginPath();
    c.moveTo(x + 5, y + e.h * 0.2);
    c.lineTo(x + e.w - 5, y + e.h * 0.2);
    c.lineTo(x + e.w - 7, y + e.h * 0.35);
    c.lineTo(x + 7, y + e.h * 0.35);
    c.closePath();
    c.fill();
    // Headlights (at top since facing down)
    c.fillStyle = '#aaaabb';
    c.fillRect(x + 3, y + e.h - 3, 5, 2.5);
    c.fillRect(x + e.w - 8, y + e.h - 3, 5, 2.5);
    // Taillights (at bottom which is visually the top since car faces down)
    c.fillStyle = '#ff2222';
    c.fillRect(x + 3, y + 1, 5, 2.5);
    c.fillRect(x + e.w - 8, y + 1, 5, 2.5);
    // Wheels
    for (const [wx, wy] of [[x + 1, y + 5], [x + e.w - 7, y + 5], [x + 1, y + e.h - 10], [x + e.w - 7, y + e.h - 10]]) {
      c.fillStyle = '#111111';
      c.beginPath(); c.ellipse(wx + 3, wy + 2.5, 3, 2, 0, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#666688';
      c.beginPath(); c.ellipse(wx + 3, wy + 2.5, 1.8, 1.2, 0, 0, Math.PI * 2); c.fill();
    }

  } else if (e.type === 1) {
    // MINIVAN
    c.fillStyle = '#445544';
    drawRoundRect(c, x, y, e.w, e.h, 4);
    c.fill();
    c.fillStyle = '#3a4a3a';
    c.fillRect(x + 2, y + e.h * 0.15, e.w - 4, e.h * 0.55);
    // Rear windows
    c.fillStyle = 'rgba(85,119,102,0.5)';
    for (let i = 0; i < 3; i++) {
      c.fillRect(x + 4 + i * (e.w - 8) / 3, y + e.h * 0.2, (e.w - 14) / 3, e.h * 0.12);
    }
    // Side windows
    c.fillStyle = 'rgba(68,102,85,0.4)';
    c.fillRect(x + 1, y + e.h * 0.2, 2, e.h * 0.35);
    c.fillRect(x + e.w - 3, y + e.h * 0.2, 2, e.h * 0.35);
    // Door line
    c.strokeStyle = '#3a4a3a';
    c.lineWidth = 0.7;
    c.beginPath(); c.moveTo(x + e.w * 0.6, y + e.h * 0.18); c.lineTo(x + e.w * 0.6, y + e.h * 0.7); c.stroke();
    // Taillight bar
    c.fillStyle = '#ff3333';
    c.fillRect(x + 2, y + 1, e.w - 4, 4);
    // Headlights
    c.fillStyle = '#aaaa99';
    c.fillRect(x + 3, y + e.h - 3, 6, 2.5);
    c.fillRect(x + e.w - 9, y + e.h - 3, 6, 2.5);
    // Wheels
    for (const [wx, wy] of [[x, y + 6], [x + e.w - 8, y + 6], [x, y + e.h - 12], [x + e.w - 8, y + e.h - 12]]) {
      c.fillStyle = '#111111';
      c.beginPath(); c.ellipse(wx + 4, wy + 3, 4, 3, 0, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#555566';
      c.beginPath(); c.ellipse(wx + 4, wy + 3, 2.5, 1.8, 0, 0, Math.PI * 2); c.fill();
    }

  } else {
    // MOTORCYCLE
    c.fillStyle = '#aa2211';
    drawRoundRect(c, x + 1, y + 4, e.w - 2, e.h - 8, 5);
    c.fill();
    // Rider body
    c.fillStyle = '#1a1a1a';
    c.beginPath();
    c.ellipse(e.x, e.y - 2, 5, 7, 0, 0, Math.PI * 2);
    c.fill();
    // Helmet
    c.fillStyle = '#222222';
    c.beginPath();
    c.arc(e.x, e.y + 6, 4, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#334455';
    c.fillRect(e.x - 3, e.y + 5, 6, 2);
    // Handlebars
    c.strokeStyle = '#333333';
    c.lineWidth = 1.2;
    c.beginPath();
    c.moveTo(e.x - 6, e.y + 2);
    c.lineTo(e.x + 6, e.y + 2);
    c.stroke();
    // Front wheel
    c.fillStyle = '#111111';
    c.beginPath(); c.ellipse(e.x, y + e.h - 5, 4, 3, 0, 0, Math.PI * 2); c.fill();
    // Rear wheel
    c.beginPath(); c.ellipse(e.x, y + 4, 4, 3, 0, 0, Math.PI * 2); c.fill();
    // Taillight
    c.fillStyle = '#ff2200';
    c.fillRect(e.x - 2, y + 1, 4, 2);
  }
}

// ═══════════ DRAW HUD ═══════════
function drawHUD(c) {
  const biomeT = transitioning ? transitionProgress : (currentBiome === BIOME.DESERT ? 0 : 1);
  const scoreColor = lerpColor('#cc8833', '#88aa66', biomeT);
  const scoreValColor = lerpColor('#ffcc66', '#ccffaa', biomeT);
  const nitroColor = lerpColor('#cc6600', '#33cc66', biomeT);

  // Score
  c.textAlign = 'left';
  c.font = '11px monospace';
  c.fillStyle = scoreColor;
  c.fillText('SCORE', 16, 28);
  c.font = 'bold 20px monospace';
  c.fillStyle = scoreValColor;
  c.fillText(score.toString(), 16, 50);

  // Multiplier
  if (multiplier > 1) {
    c.font = 'bold 13px monospace';
    c.fillStyle = '#ffaa00';
    c.fillText('x' + multiplier.toFixed(1), 16, 67);
  }

  // Speed + hearts
  c.textAlign = 'right';
  const kmh = Math.floor(speed * 35);
  c.font = '13px monospace';
  c.fillStyle = scoreValColor;
  c.fillText(kmh + ' KM/H', W - 16, 28);

  // Hearts
  for (let i = 0; i < 3; i++) {
    const hx = W - 80 + i * 22, hy = 36;
    c.fillStyle = i < lives ? '#cc3333' : '#333333';
    c.beginPath();
    c.moveTo(hx, hy + 3);
    c.bezierCurveTo(hx, hy, hx - 5, hy, hx - 5, hy + 3);
    c.bezierCurveTo(hx - 5, hy + 6, hx, hy + 10, hx, hy + 12);
    c.bezierCurveTo(hx, hy + 10, hx + 5, hy + 6, hx + 5, hy + 3);
    c.bezierCurveTo(hx + 5, hy, hx, hy, hx, hy + 3);
    c.fill();
  }

  // Nitro bar
  const barW = 140, barH = 12;
  const barX = W / 2 - barW / 2, barY = H - 30;
  c.fillStyle = 'rgba(0,0,0,0.4)';
  drawRoundRect(c, barX - 1, barY - 1, barW + 2, barH + 2, 6);
  c.fill();
  const nitroPct = nitroActive ? nitroTimer / 2.5 : (nitroCooldown > 0 ? 1 - nitroCooldown / 6 : 1);
  c.fillStyle = nitroActive ? '#ffaa00' : (nitroCooldown > 0 ? '#555555' : nitroColor);
  drawRoundRect(c, barX, barY, barW * nitroPct, barH, 5);
  c.fill();
  c.font = '9px monospace';
  c.textAlign = 'center';
  c.fillStyle = '#ffffff';
  c.fillText(nitroActive ? 'NITRO!' : (nitroCooldown > 0 ? 'COOLDOWN' : 'NITRO [SPACE]'), W / 2, barY + 10);

  // Distance
  c.textAlign = 'left';
  c.font = '11px monospace';
  c.fillStyle = scoreColor;
  c.fillText('DIST ' + (distance / 1000).toFixed(1) + ' km', 16, H - 20);

  // FPS
  c.textAlign = 'right';
  c.font = '10px monospace';
  c.fillStyle = '#445544';
  c.fillText(fpsDisplay + ' FPS', W - 10, H - 10);

  // Biome badge
  if (biomeBadge.show && biomeBadge.alpha > 0) {
    c.save();
    c.globalAlpha = biomeBadge.alpha;
    const bw = 160, bh = 28;
    const bx = W / 2 - bw / 2, by = biomeBadge.y;
    c.fillStyle = biomeBadge.color;
    drawRoundRect(c, bx, by, bw, bh, 8);
    c.fill();
    c.strokeStyle = 'rgba(255,255,255,0.3)';
    c.lineWidth = 1;
    drawRoundRect(c, bx, by, bw, bh, 8);
    c.stroke();
    // Icon
    const ix = bx + 18, iy = by + bh / 2;
    if (biomeBadge.name.includes('DESERT')) {
      c.fillStyle = '#3a6b2a';
      c.fillRect(ix - 2, iy - 8, 4, 14);
      c.fillRect(ix - 7, iy - 4, 5, 3);
      c.fillRect(ix - 7, iy - 7, 3, 6);
      c.fillRect(ix + 2, iy - 2, 5, 3);
      c.fillRect(ix + 5, iy - 5, 3, 5);
    } else {
      c.fillStyle = '#4a3a2a';
      c.fillRect(ix - 1.5, iy - 2, 3, 10);
      c.fillStyle = '#1a4a10';
      c.beginPath();
      c.arc(ix, iy - 5, 7, 0, Math.PI * 2);
      c.fill();
    }
    c.font = 'bold 11px monospace';
    c.textAlign = 'center';
    c.fillStyle = '#ffffff';
    c.fillText(biomeBadge.name, bx + bw / 2 + 8, by + bh / 2 + 4);
    c.restore();
  }

  // Near miss popup
  if (nearMissFlash > 0) {
    c.save();
    c.globalAlpha = nearMissFlash;
    c.font = 'bold 16px monospace';
    c.textAlign = 'center';
    c.fillStyle = '#ffdd44';
    c.fillText(nearMissText, W / 2, player.y - 40 - (1 - nearMissFlash) * 20);
    c.restore();
  }

  // Red vignette on hit
  if (redVignette > 0) {
    c.save();
    c.globalAlpha = redVignette * 0.3;
    const vgrd = c.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.8);
    vgrd.addColorStop(0, 'rgba(255,0,0,0)');
    vgrd.addColorStop(1, 'rgba(255,0,0,1)');
    c.fillStyle = vgrd;
    c.fillRect(0, 0, W, H);
    c.restore();
  }
}

// ═══════════ DRAW START SCREEN ═══════════
function drawStartScreen(c) {
  const mid = W / 2;

  // Left half desert, right half forest
  c.save();
  c.beginPath();
  c.rect(0, 0, mid, H);
  c.clip();
  drawDesert(c, menuScroll, 1);
  c.restore();

  c.save();
  c.beginPath();
  c.rect(mid, 0, mid, H);
  c.clip();
  drawForest(c, menuScroll, 1);
  c.restore();

  // Split line
  c.strokeStyle = 'rgba(255,255,255,0.2)';
  c.lineWidth = 2;
  c.beginPath(); c.moveTo(mid, 0); c.lineTo(mid, H); c.stroke();

  // Overlay
  c.fillStyle = 'rgba(0,0,0,0.45)';
  c.fillRect(0, 0, W, H);

  // Title
  const ty = H * 0.35;
  c.textAlign = 'center';
  c.font = 'bold 38px monospace';

  c.save();
  c.beginPath(); c.rect(0, 0, mid, H); c.clip();
  c.fillStyle = '#ffcc66';
  c.fillText('ROAD ESCAPE', mid, ty);
  c.restore();

  c.save();
  c.beginPath(); c.rect(mid, 0, mid, H); c.clip();
  c.fillStyle = '#88cc66';
  c.fillText('ROAD ESCAPE', mid, ty);
  c.restore();

  // Subtitle
  c.font = '13px monospace';
  c.fillStyle = '#ccccaa';
  c.fillText('TWO WORLDS \u2014 ONE ROAD', mid, ty + 30);

  // Controls
  c.font = '11px monospace';
  c.fillStyle = 'rgba(200,200,180,0.6)';
  c.fillText('\u2190 \u2192 or A/D: Steer   |   SPACE: Nitro   |   P: Pause', mid, ty + 60);

  // Blink enter
  if (Math.floor(totalTime * 1.43) % 2 === 0) {
    c.font = 'bold 16px monospace';
    c.fillStyle = '#ffffff';
    c.fillText('PRESS ENTER', mid, ty + 100);
  }

  // Best score
  if (bestScore > 0) {
    c.font = '11px monospace';
    c.fillStyle = '#888877';
    c.fillText('BEST: ' + bestScore, mid, ty + 130);
  }
}

// ═══════════ DRAW GAME OVER ═══════════
function drawGameOver(c) {
  c.fillStyle = 'rgba(0,0,0,0.73)';
  c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.font = 'bold 32px monospace';
  c.fillStyle = '#cc4444';
  c.fillText('GAME OVER', W / 2, H * 0.32);

  c.font = '14px monospace';
  c.fillStyle = '#ddddcc';
  c.fillText('SCORE: ' + score, W / 2, H * 0.42);
  c.fillText('BEST: ' + bestScore, W / 2, H * 0.47);
  c.fillText('DISTANCE: ' + (distance / 1000).toFixed(1) + ' km', W / 2, H * 0.52);
  c.fillText('BIOME TRANSITIONS: ' + biomeTransitions, W / 2, H * 0.57);

  if (Math.floor(totalTime * 1.43) % 2 === 0) {
    c.font = 'bold 14px monospace';
    c.fillStyle = '#ffffff';
    c.fillText('PRESS ENTER TO RESTART', W / 2, H * 0.67);
  }
}

// ═══════════ DRAW PAUSE ═══════════
function drawPause(c) {
  c.fillStyle = 'rgba(0,0,0,0.55)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center';
  c.font = 'bold 28px monospace';
  c.fillStyle = '#ffffff';
  c.fillText('PAUSED', W / 2, H / 2);
  c.font = '12px monospace';
  c.fillStyle = '#aaaaaa';
  c.fillText('Press P to resume', W / 2, H / 2 + 30);
}

// ═══════════ MAIN RENDER ═══════════
function render() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === STATE.MENU) {
    drawStartScreen(ctx);
    return;
  }

  const scroll = scrollOffset;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (transitioning) {
    const oldAlpha = 1 - transitionProgress;
    const newAlpha = transitionProgress;
    const isDesertOld = currentBiome === BIOME.DESERT;

    ctxD.clearRect(0, 0, W, H);
    ctxF.clearRect(0, 0, W, H);

    if (isDesertOld) {
      drawDesert(ctxD, scroll, 1);
      drawForest(ctxF, scroll, 1);
    } else {
      drawForest(ctxF, scroll, 1);
      drawDesert(ctxD, scroll, 1);
    }

    if (isDesertOld) {
      ctx.globalAlpha = oldAlpha;
      ctx.drawImage(offDesert, 0, 0);
      ctx.globalAlpha = newAlpha;
      ctx.drawImage(offForest, 0, 0);
    } else {
      ctx.globalAlpha = oldAlpha;
      ctx.drawImage(offForest, 0, 0);
      ctx.globalAlpha = newAlpha;
      ctx.drawImage(offDesert, 0, 0);
    }
    ctx.globalAlpha = 1;
  } else {
    if (currentBiome === BIOME.DESERT) {
      drawDesert(ctx, scroll, 1);
    } else {
      drawForest(ctx, scroll, 1);
    }
  }

  // Forest: player headlight cone
  const showHeadlights = transitioning ? (nextBiome === BIOME.FOREST ? transitionProgress > 0.3 : currentBiome === BIOME.FOREST && transitionProgress < 0.7) : currentBiome === BIOME.FOREST;
  if (showHeadlights) {
    ctx.fillStyle = 'rgba(255,238,170,0.05)';
    ctx.beginPath();
    ctx.moveTo(player.x - 12, player.y - player.h / 2);
    ctx.lineTo(player.x - 35, player.y - player.h / 2 - 100);
    ctx.lineTo(player.x + 35, player.y - player.h / 2 - 100);
    ctx.lineTo(player.x + 12, player.y - player.h / 2);
    ctx.closePath();
    ctx.fill();
  }

  // Draw enemies
  for (const e of enemies) drawEnemyCar(ctx, e);

  // Draw player
  drawPlayerCar(ctx, player.x, player.y);

  // Nitro visual effect
  if (nitroActive) {
    ctx.fillStyle = 'rgba(255,140,0,0.2)';
    ctx.beginPath();
    ctx.moveTo(player.x - 5, player.y + player.h / 2);
    ctx.lineTo(player.x - 10, player.y + player.h / 2 + rng(15, 30));
    ctx.lineTo(player.x, player.y + player.h / 2 + rng(20, 35));
    ctx.lineTo(player.x + 10, player.y + player.h / 2 + rng(15, 30));
    ctx.lineTo(player.x + 5, player.y + player.h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,220,50,0.3)';
    ctx.beginPath();
    ctx.moveTo(player.x - 3, player.y + player.h / 2);
    ctx.lineTo(player.x - 6, player.y + player.h / 2 + rng(8, 18));
    ctx.lineTo(player.x, player.y + player.h / 2 + rng(12, 22));
    ctx.lineTo(player.x + 6, player.y + player.h / 2 + rng(8, 18));
    ctx.lineTo(player.x + 3, player.y + player.h / 2);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();

  // HUD
  drawHUD(ctx);

  if (gameState === STATE.PAUSED) drawPause(ctx);
  if (gameState === STATE.GAMEOVER) drawGameOver(ctx);
}

// ═══════════ GAME LOOP ═══════════
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  totalTime += gameState === STATE.MENU ? dt : 0;

  fpsCounter++;
  fpsTime += dt;
  if (fpsTime >= 1) { fpsDisplay = fpsCounter; fpsCounter = 0; fpsTime = 0; }

  update(dt);
  if (audioStarted) updateAudio(dt);
  render();
}

resetPlayer();
requestAnimationFrame(gameLoop);

</script>
